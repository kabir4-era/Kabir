<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anup Portfolio</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* ===== LOADER ===== */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  font-size: 2rem;
}

/* ===== TYPING ===== */
h1 {
  margin-top: 40px;
  font-size: 2.5rem;
}

/* ===== PARTICLES ===== */
.particles {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(99,102,241,0.2) 2px, transparent 2px);
  background-size: 40px 40px;
  animation: moveParticles 20s linear infinite;
  z-index: 0;
}

@keyframes moveParticles {
  from { transform: translateY(0); }
  to { transform: translateY(-40px); }
}

/* ===== CIRCLE ===== */
.circle-container {
  position: relative;
  width: 320px;
  height: 320px;
  margin: 80px auto;
  animation: rotate 20s linear infinite;
  z-index: 2;
}

.circle-container:hover {
  animation-play-state: paused;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* CENTER IMAGE */
.center-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 30px #6366f1;
}

.center-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ITEMS */
.item {
  position: absolute;
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg,#6366f1,#ec4899);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;

  top: 50%;
  left: 50%;

  transform: rotate(calc(60deg * var(--i)))
             translate(140px)
             rotate(calc(-60deg * var(--i)));

  transition: 0.4s;
  box-shadow: 0 0 15px rgba(99,102,241,0.5);
}

.item:hover {
  transform: rotate(calc(60deg * var(--i)))
             translate(140px)
             rotate(calc(-60deg * var(--i)))
             scale(1.2);

  box-shadow: 0 0 25px #ec4899;
}

/* ===== IMAGE FADE ===== */
.fade-img {
  opacity: 0;
  transform: scale(0.9);
  transition: 1s ease;
}

.fade-img.loaded {
  opacity: 1;
  transform: scale(1);
}

/* ===== CURSOR GLOW ===== */
.cursor-glow {
  position: fixed;
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 1;
}

/* ===== CONTACT FORM ===== */
form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 320px;
  margin: 60px auto;
  z-index: 2;
  position: relative;
}

input, textarea {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  background: #6366f1;
  color: white;
  border: none;
  cursor: pointer;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .circle-container {
    width: 250px;
    height: 250px;
  }

  .item {
    width: 50px;
    height: 50px;
    font-size: 1.2rem;
  }

  h1 {
    font-size: 2rem;
  }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- PARTICLES -->
<div class="particles"></div>

<!-- NAME -->
<h1 id="typing"></h1>

<!-- CIRCLE -->
<div class="circle-container">

  <div class="center-circle">
    <img src="profile.png" class="fade-img" id="mainImg">
  </div>

  <div class="item" style="--i:0">💻</div>
  <div class="item" style="--i:1">🎨</div>
  <div class="item" style="--i:2">🌐</div>
  <div class="item" style="--i:3">📱</div>
  <div class="item" style="--i:4">⚡</div>
  <div class="item" style="--i:5">🚀</div>

</div>

<!-- CONTACT -->
<form action="https://formspree.io/f/xyzabcd" method="POST">
  <input type="text" name="name" placeholder="Your Name" required>
  <input type="email" name="email" placeholder="Your Email" required>
  <textarea name="message" placeholder="Message" required></textarea>
  <button type="submit">Send</button>
</form>

<!-- CURSOR -->
<div class="cursor-glow"></div>

<script>

/* LOADER */
window.addEventListener("load", () => {
  document.getElementById("loader").style.display = "none";
});

/* TYPING */
const text = "Anup Lamichhane";
let i = 0;
function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 80);
  }
}
typeEffect();

/* CURSOR GLOW */
document.addEventListener("mousemove", (e) => {
  const glow = document.querySelector(".cursor-glow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

/* IMAGE FADE */
const img = document.getElementById("mainImg");
img.onload = () => {
  img.classList.add("loaded");
};

</script>

</body>
</html>
