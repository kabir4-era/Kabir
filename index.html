<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anup - Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#6366f133,transparent),
             radial-gradient(circle at bottom,#8b5cf633,transparent);
  z-index:0;
}

/* PROFILE */
.container{position:relative;z-index:2;text-align:center;padding:80px 20px;}

.avatar{
  position:relative;
  width:180px;height:180px;margin:auto;
}

/* IMAGE */
.profile-img{
  width:100%;height:100%;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  z-index:2;
  transition:0.4s;
}

.profile-img img{
  width:100%;height:100%;
  object-fit:cover;
  opacity:0;
  transform:scale(0.9);
  transition:1s;
}

/* IMAGE LOADED */
.profile-img img.loaded{
  opacity:1;
  transform:scale(1);
}

/* GLOW BORDER */
.profile-img::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:50%;
  background:linear-gradient(45deg,#6366f1,#8b5cf6,#ec4899,#6366f1);
  background-size:300%;
  animation:border 4s linear infinite;
  z-index:-1;
}

@keyframes border{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* HOVER */
.profile-img:hover{
  transform:scale(1.08);
}

/* ORBIT */
.ring{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border:1px solid #8b5cf6;
  border-radius:50%;
  animation:spin 10s linear infinite;
}

.ring:nth-child(1){width:210px;height:210px;}
.ring:nth-child(2){width:240px;height:240px;animation-duration:15s;}

@keyframes spin{
  from{transform:translate(-50%,-50%) rotate(0)}
  to{transform:translate(-50%,-50%) rotate(360deg)}
}

/* TEXT */
h1{
  font-family:'Space Grotesk';
  font-size:3rem;
  margin-top:20px;
  background:linear-gradient(45deg,#6366f1,#ec4899);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{color:#94a3b8;margin-top:10px}

/* FLOATING IMAGE */
.float{
  position:fixed;
  bottom:20px;
  left:20px;
  animation:float 3s infinite ease-in-out;
}
.float img{width:140px;}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* AUDIO */
.audio{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0f172a;
  padding:10px 15px;
  border-radius:50px;
  display:flex;
  align-items:center;
  gap:10px;
}

button{
  background:#6366f1;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:50%;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- FLOATING IMAGE -->
<div class="float">
  <img id="floatImg">
</div>

<!-- AUDIO -->
<div class="audio">
  <button id="play">▶</button>
</div>

<div class="container">

<div class="avatar">
  <div class="ring"></div>
  <div class="ring"></div>

  <div class="profile-img">
    <img id="mainImg" src="https://github.com/kabir4-era/Kabir/raw/main/Screenshot_2026-02-01-14-10-08-739_com.instagram.android.png">
  </div>
</div>

<h1>Anup Lamichhane</h1>
<p class="subtitle">Web Developer 🚀</p>

</div>

<script>

/* IMAGE LOAD SMOOTH */
const img = document.getElementById("mainImg");
img.onload = () => img.classList.add("loaded");

/* FLOATING RANDOM IMAGE */
const imgs=[
"https://pngimg.com/uploads/anime_girl/anime_girl_PNG13.png",
"https://pngimg.com/uploads/anime_girl/anime_girl_PNG5.png",
"https://pngimg.com/uploads/anime_girl/anime_girl_PNG22.png"
];
document.getElementById("floatImg").src =
imgs[Math.floor(Math.random()*imgs.length)];

/* AUDIO */
const audio=new Audio("https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3");
let play=document.getElementById("play");
let playing=false;

play.onclick=()=>{
  if(playing){
    audio.pause();
    play.innerText="▶";
  }else{
    audio.play();
    play.innerText="⏸";
  }
  playing=!playing;
};

</script>

</body>
</html>
